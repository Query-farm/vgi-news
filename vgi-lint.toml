# vgi-lint-check configuration for the vgi-news worker.
#
# This file is discovered by both the local `vgi-lint` CLI and the
# `Query-farm/vgi-lint-check@v1` CI action (which reads config from the
# working directory).

[execution]
# The worker's CI `location` is `uv run news_worker.py`. Because the entrypoint
# carries a PEP 723 inline-metadata header, every `uv run` spawn resolves an
# ephemeral environment before the worker starts, so a single ATTACH + query
# round-trip costs ~5-12s of pure launch overhead — independent of the (trivial,
# offline) example query itself. Raise the slow-example threshold above that
# launch cost so VGI908 doesn't flag the deterministic `news_providers` example
# for cold-start time that isn't a real query-performance problem.
slow_seconds = 30.0
