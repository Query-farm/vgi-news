# vgi-lint-check configuration for the vgi-news worker.
#
# This file is discovered by both the local `vgi-lint` CLI and the
# `Query-farm/vgi-lint-check@v1` CI action (which reads config from the
# working directory).

[execution]
# The worker attaches via `.venv/bin/python news_worker.py`. Cold worker spawn +
# ATTACH + query round-trip can still cost several seconds on a loaded CI runner,
# independent of the (trivial, offline) example query itself. Keep the slow-example
# threshold well above that launch cost so VGI908 doesn't flag the deterministic
# `news_providers` example for spawn time that isn't a real query-performance problem.
slow_seconds = 30.0
